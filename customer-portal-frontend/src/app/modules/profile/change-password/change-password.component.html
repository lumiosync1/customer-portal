<div class="card">
    <div class="card-header">
        <h3 class="card-title">Change Password</h3>
    </div>
    <div class="card-body">
        <form class="form col-sm-12 col-md-4" [formGroup]="formGroup" (ngSubmit)="onSubmit()">
            <div class="fv-row mb-8">
                <label class="form-label fw-bolder text-gray-900 fs-6">Current Password</label>
                <input class="form-control bg-transparent" type="password" placeholder="Current Password" name="password"
                  formControlName="CurrentPassword" autocomplete="off" [ngClass]="{
                    'is-invalid': formGroup.controls['CurrentPassword'].invalid,
                    'is-valid': formGroup.controls['CurrentPassword'].valid
                  }" />
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                    validation: 'required',
                    message: 'Current Password is required',
                    control: formGroup.controls['CurrentPassword']
                  }"></ng-container>
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                    validation: 'minlength',
                    message: 'Password should have at least 3 symbols',
                    control: formGroup.controls['CurrentPassword']
                  }"></ng-container>
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                    validation: 'maxLength',
                    message: 'Password should have maximum 100 symbols',
                    control: formGroup.controls['CurrentPassword']
                  }"></ng-container>
            </div>

            <div class="fv-row mb-8">
                <label class="form-label fw-bolder text-gray-900 fs-6">New Password</label>
                <input class="form-control bg-transparent" type="password" placeholder="New Password" name="password"
                  formControlName="NewPassword" autocomplete="off" [ngClass]="{
                    'is-invalid': formGroup.controls['NewPassword'].invalid,
                    'is-valid': formGroup.controls['NewPassword'].valid
                  }" />
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                    validation: 'required',
                    message: 'New Password is required',
                    control: formGroup.controls['NewPassword']
                  }"></ng-container>
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                    validation: 'minlength',
                    message: 'Password should have at least 3 symbols',
                    control: formGroup.controls['NewPassword']
                  }"></ng-container>
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                    validation: 'maxLength',
                    message: 'Password should have maximum 100 symbols',
                    control: formGroup.controls['NewPassword']
                  }"></ng-container>
            </div>

            <div class="fv-row mb-8">
                <label class="form-label fw-bolder text-gray-900 fs-6">Confirm New Password</label>
                <input class="form-control bg-transparent" type="password" placeholder="Confirm New Password" name="password"
                  formControlName="ConfirmNewPassword" autocomplete="off" [ngClass]="{
                    'is-invalid': formGroup.controls['ConfirmNewPassword'].invalid,
                    'is-valid': formGroup.controls['ConfirmNewPassword'].valid
                  }" />
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                    validation: 'required',
                    message: 'Confirm New Password is required',
                    control: formGroup.controls['ConfirmNewPassword']
                  }"></ng-container>
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                    validation: 'minlength',
                    message: 'Password should have at least 3 symbols',
                    control: formGroup.controls['ConfirmNewPassword']
                  }"></ng-container>
                <ng-container [ngTemplateOutlet]="formError" [ngTemplateOutletContext]="{
                    validation: 'maxLength',
                    message: 'Password should have maximum 100 symbols',
                    control: formGroup.controls['ConfirmNewPassword']
                  }"></ng-container>
                <ng-container *ngIf="
                    formGroup.controls['ConfirmNewPassword'].errors &&
                    formGroup.controls['ConfirmNewPassword'].errors.ConfirmPassword
                ">
                <div class="fv-plugins-message-container">
                    <div class="fv-help-block">
                    'New Passsword' and 'Confirm New Password' didn't match.
                    </div>
                </div>
                </ng-container>
            </div>
            <div class="d-flex flex-wrap justify-content-end">
                <a class="btn btn-light me-3" [routerLink]="['/dashboard']">Cancel</a>
                <button type="submit" class="btn btn-primary" [disabled]="formGroup.invalid">Change Password</button>
            </div>
        </form>

        <ng-template #formError let-control="control" let-message="message" let-validation="validation">
            <ng-container *ngIf="control.hasError(validation) && (control.dirty || control.touched)">
              <div class="fv-plugins-message-container">
                <div class="fv-help-block">
                  <span role="alert">
                    {{ message }}
                  </span>
                </div>
              </div>
            </ng-container>
          </ng-template>
    </div>
</div>
