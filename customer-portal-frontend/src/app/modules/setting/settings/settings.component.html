<div class="d-flex">
    <div class="card card-flush h-lg-50 col-3 me-4">  
        <div class="card-header pt-5">
            <h3 class="card-title text-gray-800 fw-bold">Operation Settings</h3>
        </div>
        <div class="card-body pt-5">                 
                <!--begin::Item-->
                <div class="">
                    <button type="button" class="btn btn-sm btn-light-primary w-100"
                        (click)="openBreakEvenSetting()">
                        Break Even & Profit
                    </button>
                </div>
                <!--end::Item-->
    
                <!--begin::Separator-->
                <div class="separator separator-dashed my-3"></div>
                <!--end::Separator-->
    
                <!--begin::Item-->
                <div class="">
                    <button type="button" class="btn btn-sm btn-light-primary w-100"
                        (click)="openPurchaseSetting()">
                        Purchase
                    </button>
                </div>
                <!--end::Item-->
    
                <!--begin::Separator-->
                <div class="separator separator-dashed my-3"></div>
                <!--end::Separator-->
    
                <!--begin::Item-->
                <div class="">
                    <button type="button" class="btn btn-sm btn-light-primary w-100"
                        (click)="openTrackingSetting()">
                        Tracking
                    </button>
                </div>
        </div>
    </div>
    
    <div class="card card-flush h-lg-50 col-3">
        <div class="card-header pt-5">
            <h3 class="card-title text-gray-800 fw-bold">Account Settings</h3>
        </div>
        <div class="card-body pt-5">
            <div class="">
                <button type="button" class="btn btn-sm btn-light-primary w-100"
                    (click)="openBalanceTopupSetting()">
                    Balance Topup
                </button>
            </div>
        </div>
    </div>
</div>
