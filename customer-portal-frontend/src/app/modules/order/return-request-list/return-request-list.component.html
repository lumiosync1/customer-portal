<h1>Return Requests</h1>

<div class="card mt-4">
    
    <div class="card-body">
        <div class="mt-12">
            <ejs-grid #grid [dataSource]='data'
                allowPaging='true' [pageSettings]='{ pageSize: 20, pageSizes: [10, 20, 30] }' 
                [allowSorting]='true' [sortSettings]="{ columns: [{ field: 'order_id', direction: 'Descending' }] }"
                [allowFiltering]='false' 
                allowTextWrap='true'
                >
                    <e-columns>
                        <e-column field='order_id' headerText='ID' textAlign='Right' width="100"></e-column>
                        <e-column field='item_title' headerText='Item' width="300">
                            <ng-template #template let-data>
                                <a [routerLink]="['/orders', data.order_id]" target="_blank">{{data.item_title}}</a>
                            </ng-template>
                        </e-column>
                        <e-column field='created_at' headerText='Requested Date' format="MM/dd/yyyy HH:mm" width="120" ></e-column>
                        <e-column field='status' headerText='Status' width="80">
                            <ng-template #template let-data>
                                <span class="badge" [class]="'status-' + data.status">
                                    {{data.status}}
                                </span>
                            </ng-template>
                        </e-column>
                        <e-column field='return_label_url' headerText='Return Label' width="150" >
                            <ng-template #template let-data>
                                <a [href]="data.return_label_url" target="_blank">
                                    <i class="bi bi-qr-code fs-3"></i>
                                </a>
                            </ng-template>
                        </e-column>
                        <e-column field='note' headerText='Note' type="String" width="200"></e-column>
                        <e-column field='order_id' headerText='Action' width="80">
                            <ng-template #template let-data>
                                @if(data.status == 'pending') {
                                    <button class="btn btn-sm btn-icon btn-danger" 
                                    title="Delete"
                                    (click)="confirmDelete(data.order_id)">
                                        <i class="bi bi-trash"></i>
                                    </button>
                                }
                            </ng-template>
                        </e-column>
                    </e-columns>
            </ejs-grid>
        </div>
        
    </div>
  </div>
